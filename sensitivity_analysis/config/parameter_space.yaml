parameter_space:
  context_steps:
    min: 40
    max: 240
    baseline: 80
    type: int
    description: "Länge des historischen Fensters"
  
  forecast_steps:
    min: 6
    max: 60
    baseline: 12
    type: int
    description: "Prognosehorizont in Tagen"

baseline:
  context_steps: 80
  forecast_steps: 12
  stride_steps: 12

univariate_values:
  context_steps: [40, 60, 80, 120, 160, 240]
  forecast_steps: [6, 12, 24, 36, 60]

sampling:
  method: "sobol"
  n_samples: 128
  seed: 42

experiment:
  asset_config: "config/assets.yaml"
  random_seed: 42
  batch_size: 48
  
metrics:
  primary:
    - "IC_TimeSeries_Mean"
    - "RankIC_TimeSeries_Mean"
    - "MASE"
  secondary:
    - "MAE_indicative"
    - "RMSE_indicative"
    - "N_Windows"
