# Chronos LoRA Fine-Tuning Konfiguration
# Generiert am: train_chronos_lora

# === Modell ===
model_id: "amazon/chronos-2"
random_init: false

# === Daten ===
training_data_paths:
  - "C:/Users/benep/Desktop/BA/data/processed/train_data.arrow"
probability:
  - 1.0

# === Training ===
max_steps: 1000
learning_rate: 0.0001
per_device_train_batch_size: 8
gradient_accumulation_steps: 2
warmup_steps: 100
weight_decay: 0.01
max_grad_norm: 1.0

# Learning Rate Scheduler
lr_scheduler_type: "cosine"

# === Modell-Einstellungen ===
context_length: 512
prediction_length: 12

# === PEFT/LoRA Einstellungen ===
use_peft: true
peft_config:
  r: 8
  lora_alpha: 16
  target_modules: ['q', 'v', 'k', 'o']
  lora_dropout: 0.05
  bias: "none"
  task_type: "CAUSAL_LM"  # Chronos verwendet autoregressive forecasting

# === Ausgabe & Logging ===
output_dir: "C:/Users/benep/Desktop/BA/models/chronos-2-lora-finetuned"
logging_dir: "C:/Users/benep/Desktop/BA/logs/chronos-training"
logging_steps: 10
save_steps: 250
save_total_limit: 3  # Nur die 3 besten Checkpoints behalten
report_to: "tensorboard"

# === Reproduzierbarkeit ===
seed: 42

# === Performance ===
# fp16: false  # Keine GPU oder CUDA nicht verfügbar

# === Weitere Einstellungen ===
dataloader_num_workers: 4
remove_unused_columns: false
